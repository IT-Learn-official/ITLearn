name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  ultracite:
    name: Ultracite check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run Ultracite check
        run: bun x ultracite check
